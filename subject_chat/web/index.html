<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subject Chat</title>
  <style>
    :root {
      --bg: #f1f4ea;
      --panel: #fcfdf9;
      --ink: #1e2320;
      --muted: #5e6759;
      --line: #d7decf;
      --accent: #145d7a;
      --warn: #8d3b1f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at top left, #dce9f3 0%, transparent 45%),
        radial-gradient(ellipse at right, #f2eadb 0%, transparent 45%),
        var(--bg);
      padding: 20px;
    }

    .app {
      width: min(1100px, 100%);
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(20, 30, 18, 0.1);
    }

    .head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #ecf3fa 0%, #faf4ea 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-family: "Palatino", "Iowan Old Style", serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: right;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      min-height: 78vh;
    }

    .panel {
      border-right: 1px solid var(--line);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f7fbff;
    }

    .main {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    select, input, textarea, button {
      width: 100%;
      border-radius: 9px;
      border: 1px solid var(--line);
      padding: 9px 10px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      resize: vertical;
      min-height: 78px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      cursor: pointer;
      font-weight: 650;
      background: #ebf3f7;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .danger {
      background: #f7e4dc;
      border-color: #efc9bc;
      color: var(--warn);
    }

    .log {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffefb;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 300px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      white-space: pre-wrap;
      line-height: 1.35;
      background: #fff;
    }

    .item.user {
      background: #edf7f2;
    }

    .item.sys {
      background: #f5f3fb;
    }

    .small {
      font-size: 0.83rem;
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .panel { border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="head">
      <h1 class="title">Subject Chat</h1>
      <div id="status" class="status">Loading backend...</div>
    </header>

    <div class="grid">
      <aside class="panel">
        <div>
          <label>Chat Persona</label>
          <select id="chatPersona"></select>
        </div>

        <div>
          <label>Session Context (auto sent at start)</label>
          <textarea id="contextInput" placeholder="Describe the framing for this chat session."></textarea>
        </div>

        <div class="row">
          <button id="startBtn" class="primary">Start Session</button>
          <button id="finishBtn" class="danger">Finish Session</button>
        </div>

        <div class="small" id="sessionMeta">No active session.</div>

        <hr style="border:0;border-top:1px solid var(--line);width:100%;margin:4px 0;" />

        <div>
          <label>Chat Message</label>
          <textarea id="chatInput" placeholder="Write user input..."></textarea>
          <button id="chatSend">Send Chat Turn</button>
        </div>

        <button id="refreshBtn">Refresh Session Snapshot</button>
      </aside>

      <section class="main">
        <div class="small">Live Output</div>
        <div id="log" class="log"></div>
      </section>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const chatPersonaEl = document.getElementById("chatPersona");
    const contextInput = document.getElementById("contextInput");
    const startBtn = document.getElementById("startBtn");
    const finishBtn = document.getElementById("finishBtn");
    const sessionMeta = document.getElementById("sessionMeta");
    const chatInput = document.getElementById("chatInput");
    const chatSend = document.getElementById("chatSend");
    const refreshBtn = document.getElementById("refreshBtn");

    let personas = {};
    let currentSession = null;

    function addLog(text, kind = "sys") {
      const item = document.createElement("div");
      item.className = `item ${kind}`;
      item.textContent = text;
      logEl.appendChild(item);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function fillPersonaSelectors() {
      const options = Object.entries(personas)
        .map(([key, label]) => `<option value="${key}">${label}</option>`)
        .join("");
      chatPersonaEl.innerHTML = options;
      if (Object.keys(personas).includes("jekyllhyde")) {
        chatPersonaEl.value = "jekyllhyde";
      }
    }

    async function request(url, method = "GET", body = null) {
      const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) {
        throw new Error(data.detail || data.error || `Request failed: ${res.status}`);
      }
      return data;
    }

    async function loadHealth() {
      try {
        const base = await request("/api/personas");
        personas = base.personas || {};
        fillPersonaSelectors();
      } catch (err) {
        statusEl.textContent = `Backend error: ${err.message}`;
        return;
      }

      try {
        const health = await request("/api/health");
        statusEl.textContent = `Ready | Personas: ${Object.values(personas).join(" / ")}`;
        if (health.ok === false) {
          statusEl.textContent = `Personas loaded | Health warning: ${health.error || "unknown error"}`;
        }
      } catch (err) {
        statusEl.textContent = `Personas loaded | Health warning: ${err.message}`;
      }
    }

    startBtn.addEventListener("click", async () => {
      const payload = {
        chat_persona: chatPersonaEl.value,
        context: contextInput.value.trim(),
        top_k: 5,
      };

      try {
        const data = await request("/api/session/start", "POST", payload);
        currentSession = data.session_id;
        sessionMeta.textContent = `Active session: ${currentSession} (${data.mode})`;
        addLog(`Session started\nID: ${data.session_id}\nMode: ${data.mode}`);
      } catch (err) {
        addLog(`Start failed: ${err.message}`, "sys");
      }
    });

    chatSend.addEventListener("click", async () => {
      if (!currentSession) {
        addLog("Start a session first.");
        return;
      }

      const message = chatInput.value.trim();
      if (!message) {
        return;
      }

      addLog(`User: ${message}`, "user");
      chatInput.value = "";

      try {
        const data = await request("/api/chat/turn", "POST", {
          session_id: currentSession,
          message,
          top_k: 5,
        });
        addLog(`${data.persona}: ${data.reply}\n\n(memory: ${data.memory_id})`, "sys");
      } catch (err) {
        addLog(`Chat failed: ${err.message}`);
      }
    });

    finishBtn.addEventListener("click", async () => {
      if (!currentSession) {
        addLog("No active session.");
        return;
      }

      try {
        const data = await request("/api/session/finish", "POST", {
          session_id: currentSession,
          closing_note: "User ended session from UI.",
          top_k: 5,
        });

        addLog("Session finished. Final reflections:", "sys");
        for (const [persona, item] of Object.entries(data.reflections || {})) {
          addLog(`${persona} reflection:\n${item.raw_response}\n(memory: ${item.memory_id})`, "sys");
        }
      } catch (err) {
        addLog(`Finish failed: ${err.message}`);
      }
    });

    refreshBtn.addEventListener("click", async () => {
      if (!currentSession) {
        addLog("No active session to refresh.");
        return;
      }
      try {
        const data = await request(`/api/session/${currentSession}`);
        const session = data.session;
        sessionMeta.textContent = `Active session: ${session.session_id} | mode=${session.mode} | active=${session.active}`;
        addLog(`Snapshot loaded. Transcript events: ${(session.transcript || []).length}`);
      } catch (err) {
        addLog(`Refresh failed: ${err.message}`);
      }
    });

    addLog("Initialize backend, then start a session.", "sys");
    loadHealth();
  </script>
</body>
</html>
