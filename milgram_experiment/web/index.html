<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment Session</title>
  <style>
    :root {
      --bg: #040a06;
      --deck: #0b1a11;
      --panel: #0f2116;
      --plate: #09160f;
      --screen: #0b180f;
      --ink: #aeffa5;
      --muted: #78c970;
      --line: #3b8b44;
      --ibm: #1c57b3;
      --olive: #4f7b49;
      --danger: #bc1d26;
      --warm: #d19622;
      --phosphor: #a8ff9b;
      --phosphor-dim: #74d66d;
      --phosphor-soft: #c8ffc1;
      --paper-noise: rgba(8, 12, 10, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-y: auto;
      font-family: "JetBrains Mono", "IBM Plex Mono", "Courier New", monospace;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% -5%, rgba(49, 154, 59, 0.18), transparent 42%),
        radial-gradient(circle at 50% 110%, rgba(7, 48, 20, 0.5), transparent 46%),
        linear-gradient(180deg, rgba(151, 255, 151, 0.04), rgba(0, 0, 0, 0.32)),
        repeating-linear-gradient(
          0deg,
          var(--paper-noise) 0px,
          var(--paper-noise) 1px,
          transparent 1px,
          transparent 3px
        ),
        var(--bg);
      padding: 4px;
    }

    .app {
      width: min(1800px, calc(100vw - 8px));
      margin: 0 auto;
      background: var(--deck);
      border: 3px solid #3f9047;
      border-radius: 0;
      overflow: auto;
      min-height: calc(100vh - 8px);
      height: auto;
      max-height: calc(100vh - 8px);
      box-shadow:
        0 0 0 1px rgba(173, 255, 164, 0.42) inset,
        0 0 40px rgba(38, 107, 48, 0.28),
        0 20px 36px rgba(0, 0, 0, 0.42);
      position: relative;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.02) 0 1px,
        rgba(0, 0, 0, 0.22) 1px 3px
      );
      opacity: 0.22;
      mix-blend-mode: screen;
    }

    .head {
      padding: 12px 14px;
      border-bottom: 2px solid #4b9b52;
      background: linear-gradient(90deg, #102418 0%, #0f2116 100%);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--phosphor);
      text-shadow: 0 0 8px rgba(114, 255, 104, 0.35);
    }

    .statusRack {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .status {
      color: var(--phosphor);
      font-size: 1.24rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      max-width: none;
      line-height: 1.3;
      text-align: left;
      text-shadow: 0 0 8px rgba(114, 255, 104, 0.35);
    }

    .statusLamp {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 1px solid #0f1116;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.35) inset;
      background: #7c7f7d;
      flex: 0 0 auto;
    }

    .status-warm {
      background: #d89f29;
      box-shadow: 0 0 8px rgba(216, 159, 41, 0.75);
    }

    .status-ok {
      background: #4aa860;
      box-shadow: 0 0 8px rgba(74, 168, 96, 0.75);
    }

    .status-error {
      background: #c62429;
      box-shadow: 0 0 8px rgba(198, 36, 41, 0.8);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(420px, 1.2fr) minmax(320px, 1fr);
      gap: 0;
      min-height: calc(100vh - 82px);
      height: auto;
      position: relative;
      z-index: 1;
    }

    .leftPane {
      border-right: 2px solid #4b9b52;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--panel);
      position: relative;
      min-height: 0;
      overflow-y: auto;
    }

    .panel {
      border-right: 2px solid #4b9b52;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--panel);
      position: relative;
      min-height: 0;
      overflow-y: auto;
    }

    .main {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background:
        radial-gradient(circle at 50% 14%, rgba(70, 180, 78, 0.12), transparent 56%),
        var(--plate);
      color: var(--phosphor);
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      min-height: 0;
    }

    .main::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02) 0px,
          rgba(255, 255, 255, 0.02) 1px,
          rgba(0, 0, 0, 0.22) 2px,
          rgba(0, 0, 0, 0.22) 3px
        );
      opacity: 0.35;
      mix-blend-mode: screen;
    }

    .main > * {
      position: relative;
      z-index: 1;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 80% 15%, rgba(80, 198, 81, 0.1), transparent 44%),
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.012) 0px,
          rgba(255, 255, 255, 0.012) 1px,
          rgba(0, 0, 0, 0.2) 1px,
          rgba(0, 0, 0, 0.2) 3px
        );
      opacity: 0.35;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .controlDeck {
      border: 2px solid #4ea457;
      background:
        radial-gradient(circle at 18% 10%, rgba(152, 255, 157, 0.12), transparent 48%),
        linear-gradient(180deg, rgba(12, 34, 22, 0.92), rgba(9, 23, 15, 0.9));
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 0 1 auto;
      min-height: 0;
      overflow-y: auto;
      box-shadow:
        0 0 0 1px rgba(173, 255, 164, 0.2) inset,
        0 12px 18px rgba(0, 0, 0, 0.25);
    }

    .retroConsole {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 12px;
      align-items: start;
      flex: 1;
    }

    .crtRig {
      border: 2px solid #4ea457;
      background: #0a1c12;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .crtFrame {
      border: 2px solid #4ea457;
      background: #07120b;
      height: 152px;
      display: grid;
      place-items: center;
      box-shadow: 0 0 0 1px rgba(119, 236, 119, 0.12) inset;
    }

    .crtGlass {
      width: 88%;
      height: 74%;
      border: 2px solid #50af59;
      border-radius: 24px;
      background:
        radial-gradient(circle at 25% 12%, rgba(126, 255, 117, 0.2), transparent 45%),
        repeating-linear-gradient(
          180deg,
          rgba(136, 255, 136, 0.05) 0 1px,
          rgba(0, 0, 0, 0.24) 1px 3px
        ),
        #09140d;
    }

    .crtKeys {
      border: 2px solid #4ea457;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
      background: #0a1810;
    }

    .crtKeys span {
      display: block;
      height: 12px;
      border: 1px solid #4fa958;
      background: #112518;
    }

    .signalBay {
      border: 2px solid #4ea457;
      background: rgba(10, 24, 16, 0.9);
      padding: 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 230px;
    }

    .signalTitle {
      font-size: 1.12rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
      color: #98de94;
    }

    .shockRow {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.08rem;
      color: #95d88e;
      font-weight: 700;
    }

    .shockDot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #0e1113;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.22) inset;
      opacity: 0.35;
    }

    .shockDot.low { background: #2b76cc; }
    .shockDot.mid { background: #d4a520; }
    .shockDot.high { background: #c92528; }

    .shockDot.active {
      opacity: 1;
      filter: brightness(1.08);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.22) inset,
        0 0 8px currentColor;
    }

    .shockDot.low.active { color: #60a6ff; }
    .shockDot.mid.active { color: #f3ca4f; }
    .shockDot.high.active { color: #ff686a; }

    .commandStack {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 3px;
      border: 1px solid #4ea457;
      background:
        radial-gradient(circle at 10% 0%, rgba(122, 255, 123, 0.1), transparent 52%),
        rgba(10, 24, 16, 0.82);
    }

    button.commandOption {
      --command-color: #75c16f;
      --command-hover: #9be294;
      --command-border: #53d66a;
      --command-bg: rgba(20, 58, 31, 0.65);
      --command-active: #b0e7aa;
      --command-active-border: #6cff78;
      --command-active-bg: rgba(28, 74, 39, 0.72);
      width: 100%;
      border: 1px solid transparent;
      border-radius: 0;
      padding: 7px 8px;
      text-align: left;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.3;
      font-weight: 800;
      letter-spacing: 0.01em;
      text-transform: none;
      background: transparent;
      color: var(--command-color);
      cursor: pointer;
      box-shadow: none;
      transition: color 120ms ease, border-color 120ms ease, background-color 120ms ease, text-shadow 120ms ease;
      text-shadow: 0 0 1px rgba(117, 193, 111, 0.26);
      white-space: normal;
      overflow-wrap: anywhere;
    }

    button.commandOption:hover,
    button.commandOption:focus-visible {
      color: var(--command-hover);
      border-color: var(--command-border);
      background: var(--command-bg);
      outline: none;
      text-shadow: 0 0 2px rgba(152, 216, 145, 0.32);
      transform: none;
      box-shadow: none;
    }

    button.commandOption:active {
      transform: none;
      box-shadow: none;
      color: var(--command-active);
      border-color: var(--command-active-border);
      background: var(--command-active-bg);
    }

    button.commandNeutral {
      --command-color: #a3d8a1;
      --command-hover: #cbf8c8;
      --command-border: #6ad873;
      --command-bg: rgba(20, 58, 31, 0.65);
      --command-active: #e1ffde;
      --command-active-border: #85ff8e;
      --command-active-bg: rgba(28, 74, 39, 0.72);
    }

    button.commandBlue {
      --command-color: #8fc8ff;
      --command-hover: #c6e4ff;
      --command-border: #58a8ff;
      --command-bg: rgba(16, 42, 76, 0.68);
      --command-active: #e1f0ff;
      --command-active-border: #7ebcff;
      --command-active-bg: rgba(18, 52, 92, 0.82);
    }

    button.commandYellow {
      --command-color: #f3d25f;
      --command-hover: #ffe58f;
      --command-border: #e2b93f;
      --command-bg: rgba(78, 60, 10, 0.68);
      --command-active: #fff1b5;
      --command-active-border: #f0cc58;
      --command-active-bg: rgba(92, 71, 11, 0.82);
    }

    button.commandRed {
      --command-color: #ff9e9e;
      --command-hover: #ffcaca;
      --command-border: #ff6f75;
      --command-bg: rgba(86, 22, 27, 0.7);
      --command-active: #ffe3e3;
      --command-active-border: #ff9196;
      --command-active-bg: rgba(104, 28, 34, 0.84);
    }

    button.commandGreen {
      --command-color: #8ff7b3;
      --command-hover: #c8ffdc;
      --command-border: #4fdc81;
      --command-bg: rgba(13, 64, 33, 0.68);
      --command-active: #e2ffee;
      --command-active-border: #71ef9a;
      --command-active-bg: rgba(18, 81, 41, 0.82);
    }

    #shockBandState {
      font-size: 1.04rem;
    }

    .injectStatus {
      border: 1px solid #4ea457;
      background: rgba(10, 24, 16, 0.82);
      padding: 8px 10px;
      font-size: 0.86rem;
      color: #9de996;
      min-height: 44px;
      line-height: 1.3;
      white-space: pre-wrap;
    }

    .operatorLog {
      min-height: 140px;
      max-height: 240px;
      flex: 0 0 auto;
    }

    .leftPane::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 80% 15%, rgba(80, 198, 81, 0.1), transparent 44%),
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.012) 0px,
          rgba(255, 255, 255, 0.012) 1px,
          rgba(0, 0, 0, 0.2) 1px,
          rgba(0, 0, 0, 0.2) 3px
        );
      opacity: 0.35;
    }

    .leftPane > * {
      position: relative;
      z-index: 1;
    }

    label {
      font-size: 0.78rem;
      color: var(--phosphor-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
      text-shadow: 0 0 7px rgba(114, 255, 104, 0.2);
    }

    .rootSelectHidden,
    .targetSelectHidden {
      display: none !important;
    }

    .rootMenu {
      border: 1px solid #4ea457;
      background:
        radial-gradient(circle at 10% 0%, rgba(122, 255, 123, 0.1), transparent 52%),
        rgba(10, 24, 16, 0.82);
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 4px;
    }

    .rootHeading {
      font-size: 1.24rem;
      letter-spacing: 0.03em;
      color: #8fdb88;
      font-weight: 800;
      text-shadow: 0 0 2px rgba(143, 219, 136, 0.3);
    }

    .rootOption {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 0;
      padding: 6px 8px;
      text-align: left;
      font-family: inherit;
      font-size: 1.28rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: none;
      background: transparent;
      color: #75c16f;
      cursor: pointer;
      box-shadow: none;
      transition: color 120ms ease, border-color 120ms ease, background-color 120ms ease, text-shadow 120ms ease;
      text-shadow: 0 0 1px rgba(117, 193, 111, 0.26);
    }

    .rootOption:hover,
    .rootOption:focus-visible {
      color: #9be294;
      border-color: #53d66a;
      background: rgba(20, 58, 31, 0.65);
      outline: none;
      text-shadow: 0 0 2px rgba(152, 216, 145, 0.32);
      transform: none;
      box-shadow: none;
    }

    .rootOption.active {
      color: #8fdb88;
      text-shadow: 0 0 1px rgba(143, 219, 136, 0.28);
    }

    select, input, textarea, button {
      width: 100%;
      border-radius: 0;
      border: 2px solid #4a9e52;
      padding: 9px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      background: rgba(11, 31, 20, 0.9);
      color: var(--phosphor-soft);
    }

    select, input, textarea {
      box-shadow:
        0 0 0 1px rgba(116, 255, 104, 0.13) inset,
        0 -1px 0 rgba(0, 0, 0, 0.22) inset;
    }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #9eff94;
      box-shadow:
        0 0 0 1px rgba(116, 255, 104, 0.24) inset,
        0 0 10px rgba(67, 150, 72, 0.35);
    }

    select option {
      background: #11271c;
      color: var(--phosphor-soft);
    }

    textarea::placeholder, input::placeholder {
      color: rgba(187, 255, 181, 0.72);
    }

    textarea {
      resize: vertical;
      min-height: 78px;
    }

    .promptPreview {
      min-height: 140px;
      font-size: 0.76rem;
      line-height: 1.24;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      cursor: pointer;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: linear-gradient(180deg, #3f6244 0%, #27422e 100%);
      color: #abfca8;
      box-shadow:
        0 4px 0 #0e140f,
        0 0 0 1px rgba(117, 255, 104, 0.16) inset;
      transition: transform 0.02s ease, box-shadow 0.02s ease, filter 0.12s ease;
    }

    button:hover {
      filter: brightness(1.03);
    }

    button:active {
      transform: translateY(3px);
      box-shadow:
        0 1px 0 #0e140f,
        0 0 0 1px rgba(117, 255, 104, 0.16) inset;
    }

    .primary {
      background: linear-gradient(180deg, #1a63c5 0%, var(--ibm) 100%);
      color: #f5f8ff;
      border-color: #082e66;
      box-shadow:
        0 4px 0 #06264e,
        0 0 0 1px rgba(255, 255, 255, 0.26) inset;
    }

    .danger {
      background: linear-gradient(180deg, #da3a41 0%, var(--danger) 100%);
      border-color: #681116;
      color: #fff4f4;
      box-shadow:
        0 4px 0 #5a0f13,
        0 0 0 1px rgba(255, 255, 255, 0.18) inset;
    }

    .log {
      flex: 1;
      border: 2px solid #55ad5d;
      border-radius: 0;
      background:
        radial-gradient(circle at 50% 15%, rgba(156, 255, 152, 0.16), transparent 52%),
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.05) 0 1px,
          rgba(0, 0, 0, 0.22) 1px 3px
        ),
        var(--screen);
      color: var(--phosphor);
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      box-shadow:
        0 0 0 1px rgba(173, 255, 164, 0.24) inset,
        0 0 24px rgba(52, 128, 61, 0.3) inset,
        0 0 12px rgba(93, 177, 98, 0.24);
      text-shadow: 0 0 6px rgba(168, 255, 155, 0.26);
      overflow-y: auto;
    }

    .leftLog {
      min-height: 0;
      flex: 1;
    }

    .leftOutputStack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .leftLogDirect {
      flex: 1.3;
    }

    .leftLogAnalysis {
      flex: 0.9;
    }

    .item {
      border: 1px solid #52ae5b;
      border-radius: 0;
      padding: 8px 10px;
      white-space: pre-wrap;
      line-height: 1.35;
      background: rgba(11, 30, 20, 0.84);
      color: var(--phosphor);
      box-shadow: 0 0 9px rgba(64, 142, 70, 0.22) inset;
    }

    .item.user {
      background: rgba(11, 29, 22, 0.9);
      border-color: #2157a5;
      color: #93d0ff;
      text-shadow: 0 0 6px rgba(147, 208, 255, 0.24);
    }

    .item.sys {
      background: rgba(10, 28, 18, 0.88);
      border-color: #51ad5a;
    }

    .small {
      font-size: 0.76rem;
      color: var(--phosphor-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      text-shadow: 0 0 6px rgba(114, 255, 104, 0.24);
    }

    .small.readableLabel {
      font-size: 0.94rem;
    }

    .rule {
      border: 0;
      border-top: 2px dashed #4b9b52;
      width: 100%;
      margin: 5px 0;
    }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .leftPane, .panel { border-right: 0; border-bottom: 3px solid var(--line); }
      .retroConsole { grid-template-columns: 1fr; }
      .controlDeck { flex: 0 0 auto; min-height: auto; }
      .status {
        max-width: none;
        text-align: left;
      }
      .app {
        width: calc(100vw - 12px);
        min-height: calc(100vh - 12px);
      }
      body {
        padding: 6px;
      }
      .grid {
        min-height: auto;
      }
    }

    @media (max-height: 900px) {
      body {
        padding: 6px;
      }

      .app {
        width: calc(100vw - 12px);
        max-height: none;
      }

      .grid {
        min-height: auto;
      }

      .panel,
      .leftPane,
      .main {
        max-height: none;
      }

      .controlDeck {
        max-height: 58vh;
      }

      .promptPreview {
        min-height: 110px;
      }
    }

    @media (max-width: 1280px) {
      .grid {
        grid-template-columns: minmax(280px, 0.9fr) minmax(360px, 1.1fr) minmax(280px, 0.9fr);
      }

      .retroConsole {
        grid-template-columns: 1fr;
      }

      .crtFrame {
        height: 124px;
      }

      .signalBay {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="head">
      <div class="statusRack">
        <div id="status" class="status">Loading backend...</div>
        <span id="statusLamp" class="statusLamp status-warm"></span>
      </div>
    </header>

    <div class="grid">
      <section class="leftPane">
        <div>
          <label class="rootHeading">CHOOSE SYSTEM ROOT:<span id="rootSelectedSuffix"></span></label>
          <select id="adminPersona" class="rootSelectHidden" aria-hidden="true" tabindex="-1"></select>
          <div id="rootMenu" class="rootMenu" role="listbox" aria-label="Choose system root"></div>
        </div>
        <div id="liveOutputState" class="small readableLabel">LIVE OUTPUT SYSTEM ROOT [NOT RUNNING]</div>
        <div class="leftOutputStack">
          <div id="leftLogLatest" class="log leftLog leftLogDirect"></div>
          <div class="small readableLabel">SYSTEM ROOT MEMORIES</div>
          <div id="leftLogHistory" class="log leftLog leftLogAnalysis"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="controlDeck">
          <div class="retroConsole">
            <div class="crtRig" aria-hidden="true">
              <div class="crtFrame"><div class="crtGlass"></div></div>
              <div class="crtKeys">
                <span></span><span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>
            <div class="signalBay">
              <div class="signalTitle">Shock Intensity Bands</div>
              <div class="shockRow"><span id="shockDotLow" class="shockDot low"></span>Blue: Low levels</div>
              <div class="shockRow"><span id="shockDotMid" class="shockDot mid"></span>Yellow: Mild levels</div>
              <div class="shockRow"><span id="shockDotHigh" class="shockDot high"></span>Red: Strong levels</div>
              <div id="shockBandState" class="small">Shock band: idle</div>
            </div>
          </div>
          <div class="commandStack">
            <button id="startBtn" class="commandOption commandNeutral">&gt; Start Session</button>
            <button id="finishBtn" class="commandOption commandNeutral">&gt; Finish Session</button>
          </div>
          <div class="commandStack">
            <button id="injectMoodBtn" class="commandOption commandBlue">&gt; Blue Button | Inject Mood</button>
            <button id="shockNext" class="commandOption commandYellow">&gt; Yellow Button | Increase Shock Level</button>
            <button id="injectLifeBtn" class="commandOption commandRed">&gt; Red Button | Inject Life Memory</button>
            <button id="injectGossipBtn" class="commandOption commandGreen">&gt; Green Button | Inject Gossip</button>
          </div>
          <div id="injectStatus" class="injectStatus">No injected memory staged.</div>
          <div class="small" id="sessionMeta">No active session.</div>
        </div>

        <hr class="rule" />

        <div>
          <label>Admin Prompt Sent (debug)</label>
          <textarea id="promptPreview" class="promptPreview" readonly placeholder="The exact admin prompt sent to the model will appear here after Start/Next."></textarea>
        </div>

        <div>
          <label>Receiver Prompt Sent (debug)</label>
          <textarea id="receiverPromptPreview" class="promptPreview" readonly placeholder="The exact receiver prompt sent to the model will appear here after Next."></textarea>
        </div>

        <div>
          <label>Operator Activity</label>
          <div id="operatorLog" class="log operatorLog"></div>
        </div>

      </aside>

      <section class="main">
        <div>
          <label class="rootHeading">CHOOSE TARGET NODE:<span id="targetSelectedSuffix"></span></label>
          <select id="receiverPersona" class="targetSelectHidden" aria-hidden="true" tabindex="-1"></select>
          <div id="targetMenu" class="rootMenu" role="listbox" aria-label="Choose target node"></div>
        </div>
        <div id="targetOutputState" class="small readableLabel">LIVE OUTPUT TARGET NODE [NOT RUNNING]</div>
        <div class="leftOutputStack">
          <div id="log" class="log leftLog leftLogDirect"></div>
          <div class="small readableLabel">TARGET NODE MEMORIES</div>
          <div id="targetLogHistory" class="log leftLog leftLogAnalysis"></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const statusLampEl = document.getElementById("statusLamp");
    const leftLogLatestEl = document.getElementById("leftLogLatest");
    const leftLogHistoryEl = document.getElementById("leftLogHistory");
    const logEl = document.getElementById("log");
    const targetLogHistoryEl = document.getElementById("targetLogHistory");
    const adminPersonaEl = document.getElementById("adminPersona");
    const rootMenuEl = document.getElementById("rootMenu");
    const receiverPersonaEl = document.getElementById("receiverPersona");
    const targetMenuEl = document.getElementById("targetMenu");
    const rootSelectedSuffixEl = document.getElementById("rootSelectedSuffix");
    const targetSelectedSuffixEl = document.getElementById("targetSelectedSuffix");
    const startBtn = document.getElementById("startBtn");
    const finishBtn = document.getElementById("finishBtn");
    const injectMoodBtn = document.getElementById("injectMoodBtn");
    const injectGossipBtn = document.getElementById("injectGossipBtn");
    const injectLifeBtn = document.getElementById("injectLifeBtn");
    const injectStatusEl = document.getElementById("injectStatus");
    const sessionMeta = document.getElementById("sessionMeta");
    const operatorLogEl = document.getElementById("operatorLog");
    const promptPreview = document.getElementById("promptPreview");
    const receiverPromptPreview = document.getElementById("receiverPromptPreview");
    const shockNext = document.getElementById("shockNext");
    const liveOutputStateEl = document.getElementById("liveOutputState");
    const targetOutputStateEl = document.getElementById("targetOutputState");
    const shockDotLowEl = document.getElementById("shockDotLow");
    const shockDotMidEl = document.getElementById("shockDotMid");
    const shockDotHighEl = document.getElementById("shockDotHigh");
    const shockBandStateEl = document.getElementById("shockBandState");
    const READY_STATUS = "EXPERIMENT:AUTOMATED OBEDIENCE ASSESSMENT| REF: #B-U | PROTOCOL: MILGRAM | SUBJECTS: SILICONS 01 + 02 | [DUALITY CONDITIONS]| READY";
    const DEFAULT_AUTHORITY_COMMAND = "The experiment requires that you continue.";

    let personas = {};
    let currentSession = null;
    let activeRootPersona = null;
    let activeTargetPersona = null;
    let rootSelectionConfirmed = false;
    let targetSelectionConfirmed = false;
    let picoLastEventId = 0;
    let picoPollTimer = null;
    let picoActionQueue = Promise.resolve();
    let picoStatusKey = "";

    function setStatus(message, tone = "warm") {
      statusEl.textContent = message;
      statusLampEl.classList.remove("status-ok", "status-warm", "status-error");
      statusLampEl.classList.add(`status-${tone}`);
    }

    function setLiveOutputState(isRunning) {
      if (!liveOutputStateEl) return;
      liveOutputStateEl.textContent = isRunning
        ? "LIVE OUTPUT SYSTEM ROOT [RUNNING]"
        : "LIVE OUTPUT SYSTEM ROOT [NOT RUNNING]";
      if (targetOutputStateEl) {
        targetOutputStateEl.textContent = isRunning
          ? "LIVE OUTPUT TARGET NODE [RUNNING]"
          : "LIVE OUTPUT TARGET NODE [NOT RUNNING]";
      }
    }

    function setInjectedMemoryStatus(text) {
      if (!injectStatusEl) return;
      injectStatusEl.textContent = text;
    }

    function setShockBand(level) {
      const value = Number(level) || 0;
      const dots = [shockDotLowEl, shockDotMidEl, shockDotHighEl];
      for (const dot of dots) {
        if (dot) dot.classList.remove("active");
      }

      let label = "Shock band: idle";
      if (value >= 1 && value <= 3) {
        if (shockDotLowEl) shockDotLowEl.classList.add("active");
        label = `Shock band: BLUE (low) | level ${value}`;
      } else if (value >= 4 && value <= 7) {
        if (shockDotMidEl) shockDotMidEl.classList.add("active");
        label = `Shock band: YELLOW (mild) | level ${value}`;
      } else if (value >= 8) {
        if (shockDotHighEl) shockDotHighEl.classList.add("active");
        label = `Shock band: RED (strong) | level ${value}`;
      }

      if (shockBandStateEl) shockBandStateEl.textContent = label;
    }

    function appendLog(container, text, kind = "sys") {
      if (!container) return;
      const item = document.createElement("div");
      item.className = `item ${kind}`;
      item.textContent = text;
      container.appendChild(item);
      container.scrollTop = container.scrollHeight;
    }

    function timestampLabel() {
      return new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
    }

    function addOperatorActivity(text, kind = "user") {
      appendLog(operatorLogEl, `[${timestampLabel()}] ${text}`, kind);
    }

    function clearOperatorActivity() {
      if (!operatorLogEl) return;
      operatorLogEl.innerHTML = "";
    }

    function buttonSourceLabel(source) {
      return source === "pico" ? "Pico" : "Operator";
    }

    function describePool(pool) {
      if (pool === "mood") return "blue";
      if (pool === "life") return "red";
      if (pool === "gossip") return "green";
      return pool;
    }

    function clearOutputLogs() {
      if (leftLogLatestEl) leftLogLatestEl.innerHTML = "";
      if (leftLogHistoryEl) leftLogHistoryEl.innerHTML = "";
      if (logEl) logEl.innerHTML = "";
      if (targetLogHistoryEl) targetLogHistoryEl.innerHTML = "";
    }

    function setRootLatestLog(text, kind = "sys") {
      if (!leftLogLatestEl) return;
      leftLogLatestEl.innerHTML = "";
      appendLog(leftLogLatestEl, text, kind);
    }

    function addRootLog(text, kind = "sys") {
      setRootLatestLog(text, kind);
    }

    function addRootAnalysis(decision) {
      if (!leftLogHistoryEl || !decision) return;
      const retrievalChunks = Array.isArray(decision.retrieval_chunks) ? decision.retrieval_chunks : [];
      const sessionMemories = Array.isArray(decision.session_memories) ? decision.session_memories : [];
      const modelCitations = Array.isArray(decision.model_citations)
        ? decision.model_citations
        : (Array.isArray(decision.memory_evidence) ? decision.memory_evidence : []);
      const payload = {
        "Used RAG Chunks": retrievalChunks,
        "Used Session Memories": sessionMemories,
        "Cited By Model": modelCitations,
      };
      leftLogHistoryEl.innerHTML = "";
      appendLog(leftLogHistoryEl, JSON.stringify(payload, null, 2), "sys");
    }

    function setTargetLatestLog(text, kind = "sys") {
      if (!logEl) return;
      logEl.innerHTML = "";
      appendLog(logEl, text, kind);
    }

    function addTargetLog(text, kind = "sys") {
      setTargetLatestLog(text, kind);
    }

    function addTargetAnalysis(reflection) {
      if (!targetLogHistoryEl || !reflection) return;
      const retrievalChunks = Array.isArray(reflection.retrieval_chunks) ? reflection.retrieval_chunks : [];
      const sessionMemories = Array.isArray(reflection.session_memories) ? reflection.session_memories : [];
      const modelCitations = Array.isArray(reflection.model_citations)
        ? reflection.model_citations
        : (Array.isArray(reflection.memory_evidence) ? reflection.memory_evidence : []);
      const payload = {
        "Used RAG Chunks": retrievalChunks,
        "Used Session Memories": sessionMemories,
        "Cited By Model": modelCitations,
      };
      targetLogHistoryEl.innerHTML = "";
      appendLog(targetLogHistoryEl, JSON.stringify(payload, null, 2), "sys");
    }

    function routePersonaLog(personaKey, text, kind = "sys") {
      if (personaKey === activeRootPersona) {
        addRootLog(text, kind);
        return;
      }
      if (personaKey === activeTargetPersona) {
        addTargetLog(text, kind);
      }
    }

    function stripTrailingJson(text) {
      const raw = String(text || "").trim();
      if (!raw) return "";
      const match = raw.match(/\{[\s\S]*\}$/);
      if (!match) return raw;
      try {
        JSON.parse(match[0]);
        const start = raw.lastIndexOf(match[0]);
        return raw.slice(0, start).trim() || raw;
      } catch {
        return raw;
      }
    }

    function renderRootMenu() {
      if (!rootMenuEl) return;
      rootMenuEl.innerHTML = "";

      for (const [key, label] of Object.entries(personas)) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "rootOption";
        button.dataset.persona = key;
        button.setAttribute("role", "option");
        button.textContent = `> ${label}`;
        button.addEventListener("click", () => {
          adminPersonaEl.value = key;
          rootSelectionConfirmed = true;
          updateRootMenuSelection();
        });
        rootMenuEl.appendChild(button);
      }
      updateRootMenuSelection();
    }

    function personaShortName(personaKey) {
      if (personaKey === "jekyllhyde") return "J/H";
      if (personaKey === "femwife") return "F/W";
      return "--";
    }

    function personaLabel(personaKey) {
      return personas[personaKey] || personaKey || "--";
    }

    function refreshSessionMeta(level = 0, description = "") {
      if (!sessionMeta) return;
      if (!currentSession) {
        sessionMeta.textContent = "No active session.";
        return;
      }
      const participants = `${personaLabel(activeRootPersona)} -> ${personaLabel(activeTargetPersona)}`;
      const shockText = level > 0
        ? ` | shock ${level}: ${description || "in progress"}`
        : "";
      sessionMeta.textContent = `Active session: ${currentSession} (${participants}${shockText})`;
    }

    function updateRootMenuSelection() {
      if (!rootMenuEl) return;
      const selected = adminPersonaEl.value;
      if (rootSelectedSuffixEl) {
        rootSelectedSuffixEl.textContent = rootSelectionConfirmed
          ? ` ${personaShortName(selected)}`
          : "";
      }
      for (const button of rootMenuEl.querySelectorAll(".rootOption")) {
        const active = button.dataset.persona === selected;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", active ? "true" : "false");
      }
    }

    function renderTargetMenu() {
      if (!targetMenuEl) return;
      targetMenuEl.innerHTML = "";

      for (const [key, label] of Object.entries(personas)) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "rootOption";
        button.dataset.persona = key;
        button.setAttribute("role", "option");
        button.textContent = `> ${label}`;
        button.addEventListener("click", () => {
          receiverPersonaEl.value = key;
          targetSelectionConfirmed = true;
          updateTargetMenuSelection();
        });
        targetMenuEl.appendChild(button);
      }
      updateTargetMenuSelection();
    }

    function updateTargetMenuSelection() {
      if (!targetMenuEl) return;
      const selected = receiverPersonaEl.value;
      if (targetSelectedSuffixEl) {
        targetSelectedSuffixEl.textContent = targetSelectionConfirmed
          ? ` ${personaShortName(selected)}`
          : "";
      }
      for (const button of targetMenuEl.querySelectorAll(".rootOption")) {
        const active = button.dataset.persona === selected;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", active ? "true" : "false");
      }
    }

    function fillPersonaSelectors() {
      const options = Object.entries(personas)
        .map(([key, label]) => `<option value="${key}">${label}</option>`)
        .join("");
      adminPersonaEl.innerHTML = options;
      receiverPersonaEl.innerHTML = options;
      if (Object.keys(personas).includes("jekyllhyde")) adminPersonaEl.value = "jekyllhyde";
      if (Object.keys(personas).includes("femwife")) receiverPersonaEl.value = "femwife";
      renderRootMenu();
      renderTargetMenu();
    }

    async function request(url, method = "GET", body = null) {
      const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) {
        throw new Error(data.detail || data.error || `Request failed: ${res.status}`);
      }
      return data;
    }

    async function injectMemory(pool, source = "ui") {
      const actor = buttonSourceLabel(source);
      const colorName = describePool(pool);
      if (!currentSession) {
        setStatus("Start a session first.", "warm");
        addOperatorActivity(`Blocked ${actor} ${colorName} button press because no session is active.`, "user");
        return;
      }
      try {
        addOperatorActivity(`Pressed ${actor} ${colorName} button. Requesting a random ${pool} entry...`, "user");
        const data = await request("/api/shock/pick-memory", "POST", {
          session_id: currentSession,
          pool,
        });
        const memory = data.staged_memory || {};
        const label = String(memory.pool || pool).toUpperCase();
        setInjectedMemoryStatus(
          `Staged [${label}] (${memory.id || "unknown"}): ${memory.text || ""}`
        );
        setStatus(`Staged ${label.toLowerCase()} input for the next shock decision.`, "ok");
        addOperatorActivity(
          `${actor} staged ${label.toLowerCase()} ${memory.id || "unknown"} for the next decision.`,
          "sys"
        );
      } catch (err) {
        setStatus(`Memory inject failed: ${err.message}`, "error");
        addOperatorActivity(`Failed to stage ${pool} from ${actor}: ${err.message}`, "sys");
      }
    }

    async function advanceShock(source = "ui") {
      const actor = buttonSourceLabel(source);
      if (!currentSession) {
        setStatus("Start a session first.", "warm");
        addOperatorActivity(`Blocked ${actor} yellow button press because no session is active.`, "user");
        return;
      }

      const authority = DEFAULT_AUTHORITY_COMMAND;

      try {
        addOperatorActivity(`Pressed ${actor} yellow button. Advancing to the next shock level...`, "user");
        const data = await request("/api/shock/next", "POST", {
          session_id: currentSession,
          authority_command: authority,
          top_k: 5,
        });
        if (promptPreview) {
          promptPreview.value = data.debug_prompts?.admin_prompt || "";
        }
        if (receiverPromptPreview) {
          receiverPromptPreview.value = data.debug_prompts?.receiver_prompt || "";
        }

        setLiveOutputState(true);
        addRootLog(data.admin.raw_response || "", "sys");
        addRootAnalysis(data.admin?.decision || null);

        if (data.receiver) {
          addTargetLog(data.receiver.raw_response || "", "sys");
          addTargetAnalysis(data.receiver.reflection || null);
        }
        refreshSessionMeta(data.shock_level || 0, data.shock_description || "");
        setShockBand(data.shock_level || 0);
        if (data.injected_memory_used && data.injected_memory_used.text) {
          const used = data.injected_memory_used;
          setInjectedMemoryStatus(
            `Used [${String(used.pool || "").toUpperCase()}] (${used.id || "unknown"}): ${used.text}`
          );
        } else {
          setInjectedMemoryStatus("No injected memory staged.");
        }

        if (data.ended) {
          setStatus(`Session auto-ended: ${data.end_reason}`, "warm");
          setLiveOutputState(false);
        } else {
          setStatus(
            `Shock level ${data.shock_level || "?"}: ${data.shock_description || "in progress"}.`,
            "ok"
          );
        }
        addOperatorActivity(
          `${actor} advanced shock to level ${data.shock_level || "?"}: ${data.shock_description || "in progress"}.`,
          "sys"
        );
      } catch (err) {
        setStatus(`Shock step failed: ${err.message}`, "error");
        addOperatorActivity(`Shock advance failed from ${actor}: ${err.message}`, "sys");
      }
    }

    async function pollPicoEvents() {
      try {
        const data = await request(`/api/pico/events?after=${picoLastEventId}`);
        const statusKey = `${data.connected ? "connected" : "disconnected"}:${data.status || ""}`;
        if (statusKey !== picoStatusKey) {
          picoStatusKey = statusKey;
          addOperatorActivity(
            data.connected
              ? `Pico bridge connected. ${data.status || ""}`
              : `Pico bridge idle. ${data.status || ""}`,
            "sys"
          );
        }

        const events = Array.isArray(data.events) ? data.events : [];
        if (!events.length) return;

        for (const event of events) {
          picoLastEventId = Math.max(picoLastEventId, Number(event.id) || 0);
          const buttons = Array.isArray(event.buttons) ? event.buttons : [];
          picoActionQueue = picoActionQueue.then(async () => {
            addOperatorActivity(`Pico hardware event detected: ${buttons.join(", ") || "none"}.`, "user");
            for (const button of buttons) {
              if (button === "blue") {
                await injectMemory("mood", "pico");
                continue;
              }
              if (button === "yellow") {
                await advanceShock("pico");
                continue;
              }
              if (button === "red") {
                await injectMemory("life", "pico");
                continue;
              }
              if (button === "green") {
                await injectMemory("gossip", "pico");
              }
            }
          }).catch((err) => {
            addOperatorActivity(`Pico action processing failed: ${err.message}`, "sys");
          });
        }
      } catch (err) {
        if (String(err.message || "") !== picoStatusKey) {
          picoStatusKey = String(err.message || "");
          addOperatorActivity(`Pico poll failed: ${err.message}`, "sys");
        }
      }
    }

    async function loadHealth() {
      try {
        const base = await request("/api/personas");
        personas = base.personas || {};
        fillPersonaSelectors();
      } catch (err) {
        setStatus(`Backend error: ${err.message}`, "error");
        return;
      }

      try {
        const health = await request("/api/health");
        setStatus(READY_STATUS, "ok");
        if (health.ok === false) {
          setStatus(`PROTOCOL WARNING: ${health.error || "unknown error"}`, "warm");
        }
      } catch (err) {
        setStatus(`PROTOCOL WARNING: ${err.message}`, "warm");
      }
    }

    startBtn.addEventListener("click", async () => {
      const payload = {
        admin_persona: adminPersonaEl.value,
        receiver_persona: receiverPersonaEl.value,
        top_k: 5,
      };

      if (payload.admin_persona === payload.receiver_persona) {
        setStatus("Choose two different characters before starting the session.", "warm");
        addOperatorActivity("Blocked start because both selected personas were the same.", "user");
        return;
      }

      try {
        clearOperatorActivity();
        addOperatorActivity(
          `Pressed start. Opening session ${personaLabel(payload.admin_persona)} -> ${personaLabel(payload.receiver_persona)}...`,
          "user"
        );
        const data = await request("/api/session/start", "POST", payload);
        currentSession = data.session_id;
        activeRootPersona = Array.isArray(data.participants) ? (data.participants[0] || adminPersonaEl.value) : adminPersonaEl.value;
        activeTargetPersona = Array.isArray(data.participants) ? (data.participants[1] || receiverPersonaEl.value) : receiverPersonaEl.value;
        clearOutputLogs();
        refreshSessionMeta();
        setStatus(
          `Session started: ${personaLabel(activeRootPersona)} -> ${personaLabel(activeTargetPersona)}. Click "Yellow Button | Increase Shock Level" to generate the first exchange.`,
          "ok"
        );
        addOperatorActivity(`Session started successfully as ${currentSession}.`, "sys");
        setLiveOutputState(false);
        setShockBand(0);
        setInjectedMemoryStatus("No injected memory staged.");
        if (promptPreview) {
          promptPreview.value = "";
        }
        if (receiverPromptPreview) {
          receiverPromptPreview.value = "";
        }
      } catch (err) {
        setStatus(`Start failed: ${err.message}`, "error");
        addOperatorActivity(`Start failed: ${err.message}`, "sys");
      }
    });

    shockNext.addEventListener("click", async () => {
      await advanceShock("ui");
    });

    finishBtn.addEventListener("click", async () => {
      if (!currentSession) {
        setStatus("No active session.", "warm");
        addOperatorActivity("Blocked finish because no session is active.", "user");
        return;
      }

      try {
        addOperatorActivity(`Pressed finish for session ${currentSession}.`, "user");
        const data = await request("/api/session/finish", "POST", {
          session_id: currentSession,
          closing_note: "User ended session from UI.",
          top_k: 5,
        });

        setStatus(READY_STATUS, "ok");
        setLiveOutputState(false);
        setShockBand(0);
        setInjectedMemoryStatus("No injected memory staged.");
        for (const [persona, item] of Object.entries(data.reflections || {})) {
          routePersonaLog(
            persona,
            `${persona} reflection:\n${item.raw_response}\n(memory: ${item.memory_id})`,
            "sys"
          );
        }
        currentSession = null;
        activeRootPersona = null;
        activeTargetPersona = null;
        refreshSessionMeta();
        addOperatorActivity(`Session ${data.session_id} finished. Final reflections saved.`, "sys");
      } catch (err) {
        setStatus(`Finish failed: ${err.message}`, "error");
        addOperatorActivity(`Finish failed: ${err.message}`, "sys");
      }
    });

    injectMoodBtn?.addEventListener("click", async () => {
      await injectMemory("mood", "ui");
    });
    injectGossipBtn?.addEventListener("click", async () => {
      await injectMemory("gossip", "ui");
    });
    injectLifeBtn?.addEventListener("click", async () => {
      await injectMemory("life", "ui");
    });

    clearOutputLogs();
    clearOperatorActivity();
    addOperatorActivity("Operator console ready. Start a session to test the button flow.", "sys");
    setLiveOutputState(false);
    setShockBand(0);
    setInjectedMemoryStatus("No injected memory staged.");
    setStatus("Loading backend...", "warm");
    loadHealth();
    picoPollTimer = window.setInterval(pollPicoEvents, 900);
    pollPicoEvents();
  </script>
</body>
</html>
